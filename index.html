<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adaptive-layout-xs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="adaptive-layouts-style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<section class="container">
    <div class="row d-flex align-items-center">
        <div class="col-xs-1 col-sm-6 col-md-4 col-lg-4 col-xl text-center bg-danger">1</div>
        <div class="col-xs-1 col-sm-6 col-md-4 col-lg-4 col-xl text-center bg-danger bg-gradient">2</div>
        <div class="col-xs-1 col-sm-6 col-md-4 col-lg-4 col-xl text-center bg-warning">3</div>
        <div class="col-xs-1 col-sm-6 col-md-6 col-lg-6 col-xl text-center bg-success">4</div>
        <div class="col-xs-1 col-sm-12 col-md-6 col-lg-6 col-xl text-center bg-primary">5</div>
    </div>
</section>
</body>
</html>
