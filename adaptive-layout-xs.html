<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adaptive-layout-xs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="adaptive-layouts-style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<section class="container">
    <div class="row d-flex flex-column align-items-center">
        <h2 class="col-xs-1 text-center">XS</h2>
        <h2 class="col-xs-1 text-center">From 0</h2>
            <div class="col-xs-1 w-25 text-center bg-danger">1</div>
            <div class="col-xs-1 w-25 text-center bg-danger bg-gradient">2</div>
            <div class="col-xs-1 w-25 text-center bg-warning">3</div>
            <div class="col-xs-1 w-25 text-center bg-success">4</div>
            <div class="col-xs-1 w-25 text-center bg-primary">5</div>
    </div>
</section>
</body>
</html>
