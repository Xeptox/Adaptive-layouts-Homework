<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adaptive-layout-lg</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="adaptive-layouts-style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<section class="container">
    <div class="row d-flex flex-column justify-content-center">
        <div class="row d-flex flex-column align-items-center">
            <h2 class="col-lg text-center">LG</h2>
            <h2 class="col-lg text-center">From 960</h2></div>
        <div class="row d-flex align-items-center">
            <div class="col-lg-4 text-center bg-danger">1</div>
            <div class="col-lg-4 text-center bg-danger bg-gradient ">2</div>
            <div class="col-lg-4 text-center bg-warning bg-gradient">3</div>
        </div>
        <div class="row d-flex align-items-center">
            <div class="col-lg-6 text-center bg-success">4</div>
            <div class="col-lg-6 text-center bg-primary">5</div>
        </div>
    </div>
</section>
</body>
</html>
